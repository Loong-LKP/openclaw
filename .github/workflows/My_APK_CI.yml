# 用GitHubActions在Fork的别人JAVA编写的开源Android项目仓库中构建一个APK安装包
# 示例：OpenClaw
# 优先参考别人仓库中的构建信息！

name: Android APP CI
run-name: Build_Artifact

# 手动触发
on: workflow_dispatch

env:
  Tag: v2026.3.8-X

jobs:
  build:
    name: Generate APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ env.Tag }}

    # 设置 Java 运行环境
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    # 使用缓存，减少二次构建的时间
        cache: gradle

    # 构建生成发行版APK
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew :app:assembleDebug

    # 上传生成的APK到GitHubActions的网页端，方便下载
    - name: Upload artifacts
      uses: actions/upload-artifact@v5
      with:
        name: OpenClaw-${{ env.Tag }}
        path: apps/android/app/build/outputs/apk/debug/*.apk

